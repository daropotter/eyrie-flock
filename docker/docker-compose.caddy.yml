name: eyrie-flock

services:
  caddy:
    image: caddy:2-alpine
    container_name: eyrie-caddy
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    environment:
      OPENCODE_DOMAIN: ${OPENCODE_DOMAIN:?set OPENCODE_DOMAIN in .env}
      PAPERCLIP_DOMAIN: ${PAPERCLIP_DOMAIN:-}
      HERMES_DOMAIN: ${HERMES_DOMAIN:-}
      OPENCLAW_DOMAIN: ${OPENCLAW_DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ../projects/fckdc/client/dist:/var/www/fckdc:ro
      - ../deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
