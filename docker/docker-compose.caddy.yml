# Adds a Caddy reverse proxy with automatic HTTPS (ACME / Let's Encrypt) in front
# of opencode and its companion services using path-based routing on a single
# domain:
#
#   /            → opencode
#   /paperclip/* → paperclip
#   /hermes/*    → hermes
#   /openclaw/*  → openclaw
#
# Requires the base services to be running alongside, e.g.:
#
#   docker compose -f docker-compose.opencode.yml \
#                  -f docker-compose.paperclip.yml \
#                  -f docker-compose.hermes.yml \
#                  -f docker-compose.openclaw.yml \
#                  -f docker-compose.caddy.yml up -d
#   (or: make up-tls-all)
#
# Requirements:
#   * OPENCODE_DOMAIN in .env (A/AAAA record pointing at this server)
#   * firewall open on 80/tcp (ACME + HTTP->HTTPS redirect) and 443 (tcp+udp)
name: eyrie-flock

services:
  caddy:
    image: caddy:2-alpine
    container_name: eyrie-caddy
    restart: unless-stopped
    depends_on:
      - opencode
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      OPENCODE_DOMAIN: ${OPENCODE_DOMAIN:?set OPENCODE_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ../deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

# Tell each companion its public URL so OAuth callbacks, invite flows, and
# redirects resolve correctly through the path prefix.
  paperclip:
    environment:
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-https://${OPENCODE_DOMAIN}/paperclip}
  hermes:
    environment:
      HERMES_PUBLIC_URL: ${HERMES_PUBLIC_URL:-https://${OPENCODE_DOMAIN}/hermes}
  openclaw:
    environment:
      OPENCLAW_PUBLIC_URL: ${OPENCLAW_PUBLIC_URL:-https://${OPENCODE_DOMAIN}/openclaw}

volumes:
  caddy_data:
  caddy_config:
